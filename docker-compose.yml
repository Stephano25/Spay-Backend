# ============================================================
# DOCKER COMPOSE - SPaye Backend
# ============================================================

version: '3.8'

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:7.0
    container_name: spaye-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: spaye2024
      MONGO_INITDB_DATABASE: spaye
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - spaye-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaye-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://admin:spaye2024@mongodb:27017/spaye?authSource=admin
      - JWT_SECRET=spaye-production-super-secret-key-change-this
      - JWT_EXPIRES_IN=7d
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=157286400
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:3000/api/auth/google/callback
      - FRONTEND_URL=http://localhost:4200
      - CORS_ORIGIN=http://localhost:4200
      - SOCKET_IO_CORS_ORIGIN=http://localhost:4200
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - spaye-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ──
volumes:
  mongo-data:
    driver: local
  uploads:
    driver: local

# ── Networks ──
networks:
  spaye-network:
    driver: bridge